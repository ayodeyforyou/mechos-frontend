name: Bug Report
description: Report a bug in MechOS
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of what's not working
      placeholder: "The search bar doesn't filter customers when I type..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the bug
      placeholder: |
        1. Login to the app
        2. Click "Customers" in bottom nav
        3. Type in search box
        4. Notice that list doesn't update
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
      placeholder: "The customer list should filter as I type"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
      placeholder: "The list stays the same, no filtering happens"
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device Type
      options:
        - Desktop (Windows)
        - Desktop (Mac)
        - Desktop (Linux)
        - Mobile (iPhone)
        - Mobile (Android)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots or screen recording if possible
      placeholder: "Drag and drop images here"

  - type: textarea
    id: logs
    attributes:
      label: Browser Console Errors
      description: Copy any errors from DevTools console (F12)
      placeholder: "Error: Cannot read property 'map' of undefined..."

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched existing issues
          required: true
        - label: I've tested on a different browser/device
          required: false
